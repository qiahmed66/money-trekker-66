name: Build Debug APK

on:
  workflow_dispatch:  # ✅ Manual trigger from GitHub UI
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 19 (project requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '19'

      - name: ⚙️ Setup Gradle (caching + compatibility)
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Make gradlew executable
        run: chmod +x gradlew

      - name: 🛠️ Build Debug APK
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-manager-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error  # 🔍 Helps catch path issues early
